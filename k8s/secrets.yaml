apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: autonomous-ai
type: Opaque
stringData:
  mongodb-uri: "mongodb://mongo:27017/autonomous_ai_agent"
  redis-url: "redis://redis:6379"
  openai-api-key: "your-openai-api-key"
  jwt-secret: "your-jwt-secret"
  serpapi-key: "your-serpapi-key"
