apiVersion: v1
kind: Service
metadata:
  name: autonomous-ai-agent
  namespace: autonomous-ai
  labels:
    app: autonomous-ai-agent
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: autonomous-ai-agent
---
apiVersion: v1
kind: Service
metadata:
  name: autonomous-ai-agent-headless
  namespace: autonomous-ai
  labels:
    app: autonomous-ai-agent
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: autonomous-ai-agent
